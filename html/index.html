<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quantity Measurement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app">

  <h1>Quantity Measurement</h1>

  <div id="types" class="row">
    <div class="card active">Length</div>
    <div class="card">Weight</div>
    <div class="card">Temperature</div>
    <div class="card">Volume</div>
  </div>

  <div id="actions" class="row">
    <button class="action-btn active">Conversion</button>
    <button class="action-btn">Comparison</button>
    <button class="action-btn">Arithmetic</button>
  </div>

  <div class="inputs">
    <input id="from-value" type="number" placeholder="From value">
    <select id="from-unit"></select>

    <input id="to-value" type="number" placeholder="To value">
    <select id="to-unit"></select>
  </div>

  <div id="operators" class="row operators">
    <button class="operator-btn active">+</button>
    <button class="operator-btn">-</button>
    <button class="operator-btn">*</button>
    <button class="operator-btn">/</button>
  </div>

  <div class="result">
    <span id="result-value">—</span>
    <span id="result-unit"></span>
  </div>

  <h3>History</h3>
  <ul id="history-list"></ul>

</div>

<script src="../js/script.js"></script>
</body>
</html>
