<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quantity Measurement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<header class="header">Welcome To Quantity Measurement</header>

<div class="container">

  <p class="label">CHOOSE TYPE</p>
  <div id="types" class="types">
    <div class="card active" data-type="Length">Length</div>
    <div class="card" data-type="Weight">Weight</div>
    <div class="card" data-type="Temperature">Temperature</div>
    <div class="card" data-type="Volume">Volume</div>
  </div>

  <p class="label">CHOOSE ACTION</p>
  <div id="actions" class="actions">
    <button class="action-btn active">Conversion</button>
    <button class="action-btn">Comparison</button>
    <button class="action-btn">Arithmetic</button>
  </div>

  <div class="inputs">
    <div>
      <input id="from-value" type="number" placeholder="From value">
      <select id="from-unit"></select>
    </div>
    <div>
      <input id="to-value" type="number" placeholder="To value">
      <select id="to-unit"></select>
    </div>
  </div>

  <div id="operators" class="operators">
    <button class="operator-btn active">+</button>
    <button class="operator-btn">-</button>
    <button class="operator-btn">*</button>
    <button class="operator-btn">/</button>
  </div>

  <div class="result">
    <span id="result-value">—</span>
    <span id="result-unit"></span>
  </div>

  <h3>History</h3>
  <ul id="history-list"></ul>

</div>

<script src="../js/script.js"></script>
</body>
</html>
