<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quantity Measurement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ CORRECT CSS LINK -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="top-bar">
    <h1>Welcome To Quantity Measurement</h1>
  </header>

  <main class="container">

    <p class="section-label">CHOOSE TYPE</p>
    <div id="types" class="type-cards">
      <div class="card active"><span>📏</span>Length</div>
      <div class="card"><span>⚖️</span>Weight</div>
      <div class="card"><span>🌡️</span>Temperature</div>
      <div class="card"><span>🧪</span>Volume</div>
    </div>

    <p class="section-label">CHOOSE ACTION</p>
    <div id="actions" class="action-tabs">
      <button class="action-btn active">Comparison</button>
      <button class="action-btn">Conversion</button>
      <button class="action-btn">Arithmetic</button>
    </div>

    <div class="input-cards">
      <div class="input-card">
        <label>FROM</label>
        <input id="from-value" type="number" value="1">
        <select id="from-unit"></select>
      </div>

      <div class="input-card">
        <label>TO</label>
        <input id="to-value" type="number" value="1000">
        <select id="to-unit"></select>
      </div>
    </div>

    <div id="operators" class="operators">
      <button class="operator-btn active">+</button>
      <button class="operator-btn">-</button>
      <button class="operator-btn">*</button>
      <button class="operator-btn">/</button>
    </div>

    <div class="result-box">
      <span id="result-value">—</span>
      <span id="result-unit"></span>
    </div>

    <section class="history">
      <h3>History</h3>
      <ul id="history-list"></ul>
    </section>

  </main>

  <!-- ✅ CORRECT JS LINK -->
  <script src="../js/script.js"></script>
</body>
</html>
