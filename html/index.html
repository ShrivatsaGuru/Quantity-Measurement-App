<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantity Measurement</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

<div class="header">
Welcome To Quantity Measurement
</div>

<div class="section">

<div class="title">CHOOSE TYPE</div>

<div class="type-grid">

<div class="card active">
<div class="icon">📏</div>
Length
</div>

<div class="card">
<div class="icon">⚖️</div>
Weight
</div>

<div class="card">
<div class="icon">🌡️</div>
Temperature
</div>

<div class="card">
<div class="icon">🧪</div>
Volume
</div>

</div>

<div class="title">CHOOSE ACTION</div>

<div class="actions">

<button class="action-btn active">Comparison</button>
<button class="action-btn">Conversion</button>
<button class="action-btn">Arithmetic</button>

</div>

<div class="input-row">

<div class="box">
<div class="label">FROM</div>
<input class="input" value="1">

<select class="select">
<option>Kilometer</option>
<option>Meter</option>
<option>Centimeter</option>
<option>Millimeter</option>
</select>
</div>

<div class="box">
<div class="label">TO</div>
<input class="input" value="1000">

<select class="select">
<option>Meters</option>
<option>Kilometers</option>
<option>Centimeters</option>
<option>Millimeters</option>
</select>
</div>

</div>

</div>

</div>

</body>
</html>
